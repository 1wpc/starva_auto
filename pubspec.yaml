name: starva_auto
description: "小四爪 - Strava Upload Tool"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  app_links: ^7.0.0
  crypto: ^3.0.7
  envied: ^1.3.3
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  receive_sharing_intent: ^1.8.1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.3
  build_runner: ^2.12.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon.png"

flutter:
  generate: true
  uses-material-design: true
